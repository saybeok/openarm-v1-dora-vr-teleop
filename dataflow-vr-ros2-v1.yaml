nodes:
- id: quittable-tick-leader
  build: pip install -e nodes/dora-openarm-quitter
  path: dora-openarm-quitter
  inputs:
    command: ui/command
  outputs:
  - tick
- id: udp-receiver
  path: ./scripts/run_quest_receiver_source.sh
  inputs:
    tick: quittable-tick-leader/tick
  outputs:
  - pose_right
  - trigger_right
  - pose_left
  - trigger_left
  - joystick_y
  - button_a
  - button_b
  - status
- id: ik
  build: pip install -e nodes/dora-openarm-kinematics
  path: dora-openarm-ik
  args: --mode bimanual --max-iters 10 --dt 0.1 --damping 0.1 --posture-cost 0.01
    --lm-damping 0.01
  inputs:
    tick: quittable-tick-leader/tick
    target_right: udp-receiver/pose_right
    target_left: udp-receiver/pose_left
    trigger_right: udp-receiver/trigger_right
    trigger_left: udp-receiver/trigger_left
  outputs:
  - position_left
  - position_right
  - status
- id: ros2-v1-bridge
  path: ./scripts/run_ros2_bridge_node.sh
  env:
    DRY_RUN: '1'
    ENABLE_GRIPPER: '0'
    SEND_HZ: '5'
    TRAJ_TIME: '0.5'
    GRIPPER_MAX: '0.044'
    GRIPPER_REVERSE: '0'
  inputs:
    position_right: ik/position_right
    position_left: ik/position_left
  outputs:
  - status
  - arm_right_observation
  - arm_left_observation
  - camera_wrist_right
  - camera_wrist_left
  - camera_head_left
  - camera_head_right
  - camera_ceiling
- id: ui
  build: pip install -e nodes/dora-openarm-data-collection-ui
  path: dora-openarm-data-collection-ui
  env:
    METADATA_FILE: metadata_mujoco.yaml
  inputs:
    tick: dora/timer/secs/1
    button_a:
      source: udp-receiver/button_a
      queue_size: 100
    button_b:
      source: udp-receiver/button_b
      queue_size: 100
  outputs:
  - command
