nodes:
  - id: ui
    build: pip install -e nodes/dora-openarm-data-collection-ui
    # build: pip install dora-openarm-data-collection-ui
    path: dora-openarm-data-collection-ui
    env:
      METADATA_FILE: "metadata.yaml"
    inputs:
      # We need at least one input to keep this node alive.
      tick: dora/timer/secs/1
    outputs:
      - command

  - id: quittable-tick-leader
    build: pip install -e nodes/dora-openarm-quitter
    # build: pip install dora-openarm-quitter
    path: dora-openarm-quitter
    inputs:
      command: ui/command
      # 250Hz
      tick: dora/timer/millis/4
    outputs:
      - tick

  - id: quittable-tick-camera
    build: pip install -e nodes/dora-openarm-quitter
    # build: pip install dora-openarm-quitter
    path: dora-openarm-quitter
    inputs:
      command: ui/command
      # tick: dora/timer/millis/200 # 5Hz
      tick: dora/timer/millis/33 # 30fps
    outputs:
      - tick

  - id: leader
    build: pip install -e nodes/dora-openarm-dummy-ker
    # build: pip install dora-openarm-dummy-ker
    path: dora-openarm-dummy-ker
    inputs:
      tick: quittable-tick-leader/tick
    outputs:
      - position_right
      - position_left
      - follower_position_right
      - follower_position_left
      - joystick_x
      - joystick_y
      - joystick_button

  - id: follower-right
    build: pip install -e nodes/dora-openarm-dummy
    # build: pip install dora-openarm-dummy
    path: dora-openarm-dummy
    inputs:
      # Event ID is only used. Event value isn't used.
      request_position: leader/follower_position_right
      move_position: leader/follower_position_right
    outputs:
      - position
      - status

  - id: camera-wrist-right
    build: pip install -e nodes/dora-openarm-dummy-camera
    # build: pip install dora-openarm-dummy-camera
    path: dora-openarm-dummy-camera
    env:
      ENCODING: "jpeg"
      IMAGE_HEIGHT: 600
      IMAGE_WIDTH: 960
      JPEG_QUALITY: 90
    inputs:
      tick: quittable-tick-camera/tick
    outputs:
      - image

  - id: follower-left
    build: pip install -e nodes/dora-openarm-dummy
    # build: pip install dora-openarm-dummy
    path: dora-openarm-dummy
    inputs:
      # Event ID is only used. Event value isn't used.
      request_position: leader/follower_position_left
      move_position: leader/follower_position_left
    outputs:
      - position
      - status

  - id: camera-wrist-left
    build: pip install -e nodes/dora-openarm-dummy-camera
    # build: pip install dora-openarm-dummy-camera
    path: dora-openarm-dummy-camera
    env:
      ENCODING: "jpeg"
      IMAGE_HEIGHT: 600
      IMAGE_WIDTH: 960
      JPEG_QUALITY: 90
    inputs:
      tick: quittable-tick-camera/tick
    outputs:
      - image

  - id: camera-head
    build: pip install -e nodes/dora-openarm-dummy-camera
    # build: pip install dora-openarm-dummy-camera
    path: dora-openarm-dummy-camera
    inputs:
      tick: quittable-tick-camera/tick
    env:
      ENCODING: "jpeg"
      IMAGE_HEIGHT: 600
      IMAGE_WIDTH: 960
      JPEG_QUALITY: 90
    outputs:
      - image

  - id: camera-ceiling
    build: pip install -e nodes/dora-openarm-dummy-camera
    # build: pip install dora-openarm-dummy-camera
    path: dora-openarm-dummy-camera
    env:
      ENCODING: "jpeg"
      IMAGE_HEIGHT: 600
      IMAGE_WIDTH: 960
      JPEG_QUALITY: 90
    inputs:
      tick: quittable-tick-camera/tick
    outputs:
      - image

  - id: recorder
    build: pip install -e nodes/dora-openarm-dataset-recorder
    # build: pip install dora-openarm-dataset-recorder
    path: dora-openarm-dataset-recorder
    env:
      METADATA_FILE: "metadata.yaml"
    inputs:
      command: ui/command
      arm_right_action: leader/follower_position_right
      arm_right_observation: follower-right/position
      camera_wrist_right: camera-wrist-right/image
      arm_left_action: leader/follower_position_left
      arm_left_observation: follower-left/position
      camera_wrist_left: camera-wrist-left/image
      camera_head: camera-head/image
      camera_ceiling: camera-ceiling/image
